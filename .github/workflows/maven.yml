# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master", "dev", "test" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "Backend_Spring/.gitignore"
      - "Frontend_Angular/.gitignore"
      
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

#--- cancellation of any in-progress run on the same branch ---
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# --- Global defaults ---
env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"
  MAVEN-OPTS: "-Xmx1024m"
  APP_NAME: "quizapp"
  # Opt into Node.js 24 for all actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# FIRST STAGE - BUILD
  
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        cache: 'maven'
        
    - name: Compile & package (skip tests)
      run: mvn -B clean package --file pom.xml -DskipTests

# SECOND STAGE - TEST

# THIRD STAGE - DEPLOY
